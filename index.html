<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>What Exploits Are Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b11;
            --glass: rgba(22, 27, 34, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --acc-work: #23a55a;
            --acc-patch: #da373c;
            --acc-unstable: #f79533;
        }
        body { font-family: 'Inter', sans-serif; background: #080b11; color: #f0f6fc; margin: 0; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; margin-bottom: 30px; }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; }
        input, select { background: var(--glass); border: 1px solid var(--border); color: white; padding: 14px 20px; border-radius: 12px; flex: 1; backdrop-filter: blur(10px); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--glass); border-radius: 16px; border: 1px solid var(--border); }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; }
        td { font-size: 0.95rem; }
        tr:last-child td { border: none; }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .working { color: var(--acc-work); background: rgba(35, 165, 90, 0.15); }
        .patched { color: var(--acc-patch); background: rgba(218, 55, 60, 0.15); }
        .unstable { color: var(--acc-unstable); background: rgba(247, 149, 51, 0.15); }
    </style>
</head>
<body>
<div class="container">
    <h1>Web check trạng thái Executors</h1>
    <div class="controls">
        <input type="text" id="search" placeholder="🔍 Tìm kiếm executor...">
        <select id="platFilter">
            <option value="all">Tất cả nền tảng</option>
            <option value="Windows">Windows</option>
            <option value="Android">Android</option>
            <option value="iOS">iOS</option>
        </select>
    </div>
    <table>
        <thead><tr><th>TÊN</th><th>TRẠNG THÁI</th><th>NỀN TẢNG</th><th>LAST UPDATE</th><th>GHI CHÚ</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    // Dữ liệu chuẩn 20 cái theo ảnh của bạn
    const data = [
        {name: "Potassium", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Volt", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Ronix", plat: "Windows", status: "patched", time: "Cập nhật sau", note: ""},
        {name: "Wave", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Synapse Z", plat: "Windows", status: "patched", time: "Cập nhật sau", note: ""},
        {name: "Seliware", plat: "Windows", status: "patched", time: "Cập nhật sau", note: ""},
        {name: "Madium", plat: "Windows", status: "unstable", time: "Cập nhật sau", note: ""},
        {name: "Cosmic", plat: "Windows", status: "patched", time: "Cập nhật sau", note: ""},
        {name: "Velocity", plat: "Windows", status: "patched", time: "Cập nhật sau", note: ""},
        {name: "SirHurt", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Xeno", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Solara", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "TDT", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Sapphire", plat: "Windows", status: "patched", time: "Cập nhật sau", note: ""},
        {name: "Real", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Yub X", plat: "Windows", status: "patched", time: "Cập nhật sau", note: ""},
        {name: "ByteBreaker", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Vortex", plat: "Windows", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Delta", plat: "Android", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Codex", plat: "Android", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Vega X", plat: "Android", status: "working", time: "Cập nhật sau", note: ""},
        {name: "Delta", plat: "iOS", status: "working", time: "Cập nhật sau", note: ""}
    ];

    function render(filter = '', plat = 'all') {
        document.getElementById('body').innerHTML = data
            .filter(x => x.name.toLowerCase().includes(filter.toLowerCase()) && (plat === 'all' || x.plat === plat))
            .map(x => `<tr>
                <td><strong>${x.name}</strong></td>
                <td><span class="badge ${x.status.toLowerCase()}">${x.status}</span></td>
                <td style="color: #8b949e;">${x.plat}</td>
                <td style="color: #f0f6fc;">${x.time}</td>
                <td style="color: #8b949e;">${x.note}</td>
            </tr>`).join('');
    }

    document.getElementById('search').addEventListener('input', (e) => render(e.target.value, document.getElementById('platFilter').value));
    document.getElementById('platFilter').addEventListener('change', (e) => render(document.getElementById('search').value, e.target.value));
    render();

    // Chặn F12 và chuột phải
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };
</script>
</body>
</html>
